name: "hlf-network"
version: "1.0"

client:
  organization: Org1MSP
  credentialStore:
    path: "/tmp/wallet"
    cryptoStore:
      path: "/tmp/msp"

organizations:
  Org1MSP:
    mspid: Org1MSP
    cryptoPath: /tmp/cryptopath
    peers:
      - org1-peer0.default
      - org1-peer1.default
    certificateAuthorities:
      - org1-ca.default
    users:
      admin:
        cert:
          pem: |
            -----BEGIN CERTIFICATE-----
            [your admin cert PEM content from the Bevel output]
            -----END CERTIFICATE-----
        key:
          pem: |
            -----BEGIN PRIVATE KEY-----
            [your admin private key PEM content from the Bevel output]
            -----END PRIVATE KEY-----

  OrdererMSP:
    mspid: OrdererMSP
    cryptoPath: /tmp/cryptopath
    orderers:
      - ord-node1.default
      - ord-node2.default
      - ord-node3.default
      - ord-node4.default

peers:
  org1-peer0.default:
    url: "grpcs://peer0-org1.localho.st:443"
    grpcOptions:
      ssl-target-name-override: "peer0-org1.localho.st"
      allow-insecure: false
    tlsCACerts:
      pem: |
        -----BEGIN CERTIFICATE-----
        [your org1-peer0 TLS CA cert PEM]
        -----END CERTIFICATE-----

  org1-peer1.default:
    url: "grpcs://peer1-org1.localho.st:443"
    grpcOptions:
      ssl-target-name-override: "peer1-org1.localho.st"
      allow-insecure: false
    tlsCACerts:
      pem: |
        -----BEGIN CERTIFICATE-----
        [your org1-peer1 TLS CA cert PEM]
        -----END CERTIFICATE-----

orderers:
  ord-node1.default:
    url: "grpcs://orderer0-ord.localho.st:443"
    grpcOptions:
      ssl-target-name-override: "orderer0-ord.localho.st"
      allow-insecure: false
    tlsCACerts:
      pem: |
        -----BEGIN CERTIFICATE-----
        [your orderer TLS CA cert PEM]
        -----END CERTIFICATE-----

  ord-node2.default:
    url: "grpcs://orderer1-ord.localho.st:443"
    grpcOptions:
      ssl-target-name-override: "orderer1-ord.localho.st"
      allow-insecure: false
    tlsCACerts:
      pem: |
        -----BEGIN CERTIFICATE-----
        [your orderer TLS CA cert PEM - same as ord-node1]
        -----END CERTIFICATE-----

  ord-node3.default:
    url: "grpcs://orderer2-ord.localho.st:443"
    grpcOptions:
      ssl-target-name-override: "orderer2-ord.localho.st"
      allow-insecure: false
    tlsCACerts:
      pem: |
        -----BEGIN CERTIFICATE-----
        [your orderer TLS CA cert PEM - same as ord-node1]
        -----END CERTIFICATE-----

  ord-node4.default:
    url: "grpcs://orderer3-ord.localho.st:443"
    grpcOptions:
      ssl-target-name-override: "orderer3-ord.localho.st"
      allow-insecure: false
    tlsCACerts:
      pem: |
        -----BEGIN CERTIFICATE-----
        [your orderer TLS CA cert PEM - same as ord-node1]
        -----END CERTIFICATE-----

certificateAuthorities:
  org1-ca.default:
    url: "https://org1-ca.localho.st:443"
    caName: ca
    tlsCACerts:
      pem: |
        -----BEGIN CERTIFICATE-----
        [your org1-ca TLS cert PEM]
        -----END CERTIFICATE-----
    registrar:
      enrollId: enroll
      enrollSecret: enrollpw
    httpOptions:
      verify: false

channels:
  _default:
    orderers:
      - ord-node1.default
      - ord-node2.default
      - ord-node3.default
      - ord-node4.default
    peers:
      org1-peer0.default:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
      org1-peer1.default:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
